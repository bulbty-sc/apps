name: Scan every 15 minutes

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scraper-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: python mycloud_vidcloud_scraper.py --output movies.json --max-pages 1

      - name: Commit updated JSON
        run: |
          if git diff --quiet -- movies.json; then
            echo "No changes found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add movies.json
          git commit -m "Update movie scan"
          git push
