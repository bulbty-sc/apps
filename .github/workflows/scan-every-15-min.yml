name: Quick scan every 15 minutes

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

# Full and quick scans must not write movies.json at the same time.
concurrency:
  group: movie-scraper-writer
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scan newest five pages
        env:
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
        run: python mycloud_vidcloud_scraper.py --output movies.json --max-pages 5

      - name: Commit updated JSON
        shell: bash
        run: |
          set -euo pipefail

          test -f movies.json || { echo "movies.json was not created."; exit 1; }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f movies.json

          if git diff --cached --quiet -- movies.json; then
            echo "movies.json has no changes."
            exit 0
          fi

          git commit -m "Update newest movie pages"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
